<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nerd Engine Releases</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0a0a0a;
      color: white;
      text-align: center;
    }

    h1 {
      margin: 40px 0 20px;
      font-size: 2rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 24px;
      padding: 24px;
      max-width: 1200px;
      margin: auto;
    }

    .card {
      background: #111;
      padding: 12px;
      border-radius: 16px;
    }

    .card img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 12px;
      display: block;
    }

    .artist {
      margin-top: 12px;
      font-weight: bold;
      font-size: 1rem;
    }

    .title {
      margin-top: 4px;
      color: #aaa;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>
  <h1>Latest Releases</h1>

  <div class="grid">
    <div class="card"><img src="01.jpg"><div class="artist">Synora</div><div class="title">432 Hz Awareness</div></div>
    <div class="card"><img src="02.jpg"><div class="artist">Jaxen</div><div class="title">Blank Space</div></div>
    <div class="card"><img src="03.jpg"><div class="artist">Sheri Sky</div><div class="title">Bleeding Love</div></div>
    <div class="card"><img src="04.jpg"><div class="artist">Tru Moksha</div><div class="title">Eastern Essence 1.0</div></div>
    <div class="card"><img src="05.jpg"><div class="artist">Me N U</div><div class="title">I Don't Wanna Know</div></div>
    <div class="card"><img src="06.jpg"><div class="artist">Soul Wan</div><div class="title">Bad Guy</div></div>
    <div class="card"><img src="07.jpg"><div class="artist">Umaryaa</div><div class="title">Californication</div></div>
    <div class="card"><img src="08.jpg"><div class="artist">Sapa Inca</div><div class="title">Hangdrum Trilogy 1.0</div></div>
    <div class="card"><img src="09.jpg"><div class="artist">Kofi Z</div><div class="title">Bad Guy</div></div>
    <div class="card"><img src="10.jpg"><div class="artist">Fluxd Out</div><div class="title">Heartless</div></div>
  </div>
</body>
</html>
