<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nerd Engine Releases</title>

  <style>
    :root {
      --bg: #050707;
      --card: #101414;
      --card-hover: #151b1b;
      --text: #ffffff;
      --muted: #a8b3b3;
      --accent: #00ff99;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .page {
      max-width: 1300px;
      margin: auto;
      padding: 40px 24px 70px;
    }

    header {
      text-align: center;
      margin-bottom: 42px;
    }

    .logo {
      color: var(--accent);
      font-size: 14px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-weight: bold;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: clamp(38px, 6vw, 72px);
      letter-spacing: -0.06em;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 22px;
    }

    .card-link {
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .card {
      background: var(--card);
      border-radius: 20px;
      padding: 12px;
      border: 1px solid rgba(255,255,255,0.07);
      transition: 0.25s ease;
    }

    .card:hover {
      transform: translateY(-6px);
      background: var(--card-hover);
      border-color: rgba(0,255,153,0.4);
    }

    .cover {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 14px;
      display: block;
      background: #1a1a1a;
    }

    .info {
      padding: 14px 4px 4px;
      text-align: center;
    }

    .artist {
      font-weight: bold;
      font-size: 15px;
      margin-bottom: 4px;
    }

    .title {
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 1000px) {
      .grid { grid-template-columns: repeat(3, 1fr); }
    }

    @media (max-width: 650px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>

<body>
